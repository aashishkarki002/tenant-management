name: Deploy Backend via SSH

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Copy source files to server
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "tenant-management-backend/."
          target: "/home/sallyanh/api.sallyanhouse.com"
          strip_components: 1
          timeout: 60

      # 3️⃣ Install dependencies and restart
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60
          command_timeout: 5m
          script: |
            set -e
            source /home/sallyanh/nodevenv/api.sallyanhouse.com/20/bin/activate
            cd /home/sallyanh/api.sallyanhouse.com
            npm install --omit=dev
            test -d node_modules/dotenv || (echo "❌ dotenv missing after npm install" && exit 1)
            mkdir -p tmp && touch tmp/restart.txt
            echo "✅ Deployment completed successfully!"
