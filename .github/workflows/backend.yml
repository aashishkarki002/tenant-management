name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ FTP Deploy
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.BACKEND_FTP_HOST }}
          username: ${{ secrets.BACKEND_FTP_USER }}
          password: ${{ secrets.BACKEND_FTP_PASSWORD }}
          port: 21
          local-dir: tenant-management-backend/
          server-dir: /api.sallyanhouse.com/
          exclude: |
            **/node_modules/**
            .github/**
            *.log
            *.zip
          dangerous-clean-slate: false

      # 3️⃣ Restart Passenger & install dependencies
      - name: Restart Passenger & Install Dependencies
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "https://api.sallyanhouse.com/deploy.php?token=${{ secrets.DEPLOY_TOKEN }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n1)
          echo "Response: $body"
          if [ "$http_code" = "200" ]; then
            echo "✅ Deployment completed successfully!"
          else
            echo "❌ Deploy script failed with HTTP $http_code"
            exit 1
          fi
