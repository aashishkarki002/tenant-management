name: Deploy Backend via FTP

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Verify repository files
      - name: Debug - List repo files
        run: |
          echo "Listing repository files..."
          ls -la

      # 3️⃣ Check local deployment folder
      - name: Debug - Check local deployment folder
        run: |
          echo "Checking tenant-management-backend folder..."
          ls -la tenant-management-backend || echo "Folder not found!"

      # 4️⃣ Check if secrets exist
      - name: Debug - Check secrets exist
        run: |
          if [ -z "${{ secrets.BACKEND_FTP_HOST }}" ]; then
            echo "❌ BACKEND_FTP_HOST is empty"
          else
            echo "✅ BACKEND_FTP_HOST exists"
          fi
          if [ -z "${{ secrets.DEPLOY_TOKEN }}" ]; then
            echo "❌ DEPLOY_TOKEN is empty"
          else
            echo "✅ DEPLOY_TOKEN exists"
          fi

      # 5️⃣ DNS test for FTP server
      - name: Debug - Test DNS resolution
        run: |
          echo "Testing DNS resolution..."
          nslookup ${{ secrets.BACKEND_FTP_HOST }} || true

      # 6️⃣ Test FTP port connectivity
      - name: Debug - Test FTP port
        run: |
          echo "Testing FTP port 21..."
          nc -zv ${{ secrets.BACKEND_FTP_HOST }} 21 || true

      # 7️⃣ FTP Deploy
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.BACKEND_FTP_HOST }}
          username: ${{ secrets.BACKEND_FTP_USER }}
          password: ${{ secrets.BACKEND_FTP_PASSWORD }}
          port: 21
          local-dir: tenant-management-backend/
          server-dir: /api.sallyanhouse.com/
          exclude: |
            **/node_modules/**
            .github/**
            *.log
            *.zip
          dangerous-clean-slate: false

      # 8️⃣ Trigger npm install & Passenger restart via deploy.php
      - name: Restart Passenger & Install Dependencies
        run: |
          echo "Triggering deploy script..."
          response=$(curl -s -w "\n%{http_code}" \
            "https://api.sallyanhouse.com/deploy.php?token=${{ secrets.DEPLOY_TOKEN }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n1)
          echo "Response: $body"
          if [ "$http_code" = "200" ]; then
            echo "✅ Deployment completed successfully!"
          else
            echo "❌ Deploy script failed with HTTP $http_code"
            exit 1
          fi
