name: Deploy Backend via SSH

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Test SSH connection (optional but recommended)
      - name: Test SSH connection
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "✅ SSH connection successful"
            whoami

      # 3️⃣ Deploy: Activate Node.js, install dependencies, restart Passenger
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "✅ Connected to server, starting deployment..."

            # Activate Node.js venv if it exists
            if [ -f /home/sallyanh/nodevenv/api.sallyanhouse.com/20/bin/activate ]; then
              echo "Activating Node.js environment..."
              source /home/sallyanh/nodevenv/api.sallyanhouse.com/20/bin/activate
            else
              echo "Node.js venv not found, using system Node.js"
            fi

            # Go to project directory
            cd /home/sallyanh/api.sallyanhouse.com

            # Install production dependencies
            echo "Installing production dependencies..."
            npm install --omit=dev

            # Restart Passenger app
            echo "Restarting Passenger application..."
            mkdir -p tmp && touch tmp/restart.txt

            echo "✅ Deployment completed successfully!"
